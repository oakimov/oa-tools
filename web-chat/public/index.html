<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>API Chat</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>🤖 API Chat</h1>
  <div class="hdr-actions">
    <button id="settingsToggle" title="Toggle Settings">⚙️</button>
    <button id="themeToggle" title="Toggle Theme">🌙</button>
  </div>
</header>

<section class="settings open" id="settingsPanel">
  <div class="settings-inner">
    <div class="field model-field">
      <label class="toggle-row">
        <input type="checkbox" id="showDeprecated">
        <span>Show deprecated models</span>
      </label>
    </div>
    <div class="field full">
      <label for="apiUrl">API Endpoint</label>
      <input type="url" id="apiUrl" placeholder="https://api.openai.com/v1/chat/completions" spellcheck="false">
    </div>
    <div class="field">
      <label for="providerSelect">Provider</label>
      <select id="providerSelect">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="responses">OpenAI Responses</option>
      </select>
    </div>
    <div class="field model-field">
      <label for="modelSelect">Model</label>
      <div class="model-row">
        <select id="modelSelect">
          <option value="">Select a model…</option>
        </select>
        <span class="model-or">or</span>
        <input type="text" id="modelInput" placeholder="Type any model name" spellcheck="false">
      </div>
    </div>
    <div class="field full">
      <label for="apiKey">API Key (or <code>$ENV_VAR_NAME</code>)</label>
      <input type="password" id="apiKey" placeholder="sk-... or $OPENAI_API_KEY" spellcheck="false">
    </div>
    <div class="field">
      <label for="temperature">Temperature</label>
      <div class="range-row">
        <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.7">
        <span class="range-val" id="temperatureVal">0.7</span>
      </div>
    </div>
    <div class="field">
      <label for="topK">Top K</label>
      <div class="range-row">
        <input type="range" id="topK" min="0" max="100" step="1" value="0">
        <span class="range-val" id="topKVal">40</span>
      </div>
    </div>
    <div class="field">
      <label for="maxTokens">Max Tokens</label>
      <input type="number" id="maxTokens" min="1" max="262144" value="4096">
    </div>
    <div class="field">
      <label for="systemPrompt">System Prompt</label>
      <input type="text" id="systemPrompt" placeholder="You are a helpful assistant." spellcheck="false">
    </div>
  </div>
</section>

<section class="chat" id="chatContainer">
  <div class="chat-inner" id="chatInner">
    <div class="empty-state" id="emptyState">
      <div class="icon">💬</div>
      <h3>Start a conversation</h3>
      <p>Configure your API settings above, then send a message.</p>
    </div>
  </div>
</section>

<div class="input-area">
  <div class="input-inner">
    <textarea id="messageInput" rows="1" placeholder="Type a message..." enterkeyhint="send"></textarea>
    <button class="send-btn" id="sendBtn" title="Send">➤</button>
  </div>
</div>

<script type="module" src="app.mjs"></script>
</body>
</html>
